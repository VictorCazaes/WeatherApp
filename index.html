<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeatherApp</title>
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Karla:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;0,800;1,200;1,300;1,400;1,500;1,600;1,700;1,800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>WeatherApp</h1>
    </header>
    <main>
        <div class="search-block">
            <div class="input-bar">
                <input class="city-input" type="text" maxlength="45" placeholder="City name" required>
                <button class="search-button">
                    <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <path d="M0 0h24v24H0V0z" fill="none" />
                        <path
                            d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" />
                    </svg>
                </button>
            </div>
        </div>
        <div class="display-card">
            <div class="display-block">
                <div class="side-block">
                    <div class="display-city"></div>
                    <div class="display-time"></div>
                    <div class="display-weather"></div>
                    <div class="display-humidity"></div>
                </div>
                <div class="side-block">
                    <div class="display-temperature"></div>
                    <div class="display-feelslike"></div>
                    <div class="display-maxmin"></div>
                </div>
            </div>
        </div>
    </main>
    <footer>
        <span>
            WeatherApp using JAVASCRIPT, HTML, CSS and API from:
            <a target="_blank" href="https://openweathermap.org/">https://openweathermap.org/</a>
        </span>
    </footer>
    <script src="script.js"></script>
</body>

</html>
